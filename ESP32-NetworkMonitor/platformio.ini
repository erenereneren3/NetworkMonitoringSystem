; ============================================================
; ESP32 Network Monitor – PlatformIO Configuration
; ============================================================
[env:esp32dev]
platform    = espressif32
board       = esp32dev
framework   = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Use LittleFS for the web dashboard files
board_build.filesystem = littlefs

; Enable regex routing in ESPAsyncWebServer
build_flags =
    -DASYNCWEBSERVER_REGEX=1
    -DCORE_DEBUG_LEVEL=0

; Dependencies – PlatformIO downloads these automatically on first Build
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    me-no-dev/AsyncTCP         @ ^1.1.1
    bblanchon/ArduinoJson      @ ^7.0.4
    marian-craciunescu/ESP32Ping @ ^1.0

; NOTE: If build fails due to ESPAsyncWebServer compatibility issues,
; replace the first two lib_deps lines with:
;   mathieucarbou/ESPAsyncWebServer @ ^3.3.0
; (This fork is more compatible with newer ESP32 Arduino cores)
